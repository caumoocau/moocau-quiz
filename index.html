<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>푸앙이의 K-MOOC 퀴즈 챌린지</title>
<meta property="og:title" content="나의 K-MOOC 퀴즈 점수는? | 푸앙이의 K-MOOC 퀴즈 챌린지">
<meta property="og:description" content="중앙대학교 K-MOOC 마스터에 도전">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{--navy:#143365;--blue:#2B95C3;--sky:#3DB1D3;--light:#6BBEE2;--pink:#DEACC5;--pink-light:#F2D6E3;--beige:#D7BCA1;--white:#FFFFFF;--ok:#2E9E6B;--no:#D9536B;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:linear-gradient(160deg,var(--pink) 0%,#e7bcd0 45%,var(--pink-light) 100%);min-height:100vh;display:flex;justify-content:center;color:var(--navy);}
.app{width:100%;max-width:480px;min-height:100vh;padding:20px 16px 40px;display:flex;flex-direction:column}
.screen{display:none;animation:fadeIn .4s ease}
.screen.active{display:flex;flex-direction:column;flex:1}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
.badge{display:inline-block;background:var(--navy);color:var(--white);font-size:13px;font-weight:700;padding:7px 16px;border-radius:999px;letter-spacing:.4px}
.start-card{background:var(--white);border-radius:28px;padding:44px 28px 36px;text-align:center;margin:auto 0;box-shadow:0 18px 50px rgba(0,0,0,.28)}
.start-card h1{font-size:27px;font-weight:800;line-height:1.35;margin:16px 0 6px}
.start-card h1 .hl{color:var(--blue)}
.start-card .sub{font-size:14.5px;color:#5b6b85;line-height:1.6}
.mascot{width:180px;margin:22px auto 8px;display:block;animation:bob 2.6s ease-in-out infinite}
.speech{display:inline-block;background:#e2f2fb;border-radius:16px;padding:9px 16px;font-size:13.5px;font-weight:600;color:var(--navy);position:relative;margin-bottom:20px}
.speech:after{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-bottom-color:#e2f2fb;border-top:0}
.btn{display:block;width:100%;border:none;cursor:pointer;font-family:inherit;border-radius:16px;padding:17px;font-size:17px;font-weight:700;text-align:center;text-decoration:none;transition:transform .15s,box-shadow .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--navy);color:var(--white);box-shadow:0 8px 20px rgba(20,51,101,.35)}
.btn-pink{background:var(--pink);color:var(--navy)}
.btn-outline{background:var(--white);color:var(--navy);border:2px solid var(--navy)}
.btn-sub{background:#eef3f9;color:var(--navy);font-size:15px;padding:14px}
.meta{margin-top:14px;font-size:12.5px;color:#8fa0b8}
.quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.quiz-mascot{width:48px;height:auto;flex-shrink:0}
.progress-wrap{flex:1}
.progress-label{color:var(--navy);font-size:12.5px;font-weight:600;margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar{height:10px;background:rgba(20,51,101,.18);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--navy),var(--blue));border-radius:999px;transition:width .35s ease;width:0}
.score-pill{align-self:flex-end;margin-bottom:10px;background:var(--navy);color:var(--white);font-weight:800;font-size:14px;padding:6px 15px;border-radius:999px;box-shadow:0 4px 10px rgba(0,0,0,.25)}
.q-card{background:var(--white);border-radius:24px;padding:28px 22px;box-shadow:0 14px 40px rgba(0,0,0,.25)}
.q-num{color:var(--sky);font-weight:800;font-size:14px;letter-spacing:1px}
.q-text{font-size:19.5px;font-weight:800;line-height:1.45;margin:10px 0 20px;word-break:keep-all}
.opt{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#f4f8fc;border:2px solid transparent;border-radius:15px;padding:15px 16px;font-size:15.5px;font-weight:600;color:var(--navy);cursor:pointer;font-family:inherit;line-height:1.45;word-break:keep-all;transition:all .15s}
.opt+.opt{margin-top:10px}
.opt:hover:not(:disabled){background:#e2f2fb;border-color:var(--blue)}
.opt:disabled{cursor:default}
.opt.correct{background:#e5f6ee;border-color:var(--ok);color:#1f7a50}
.opt.wrong{background:#fbe9ee;border-color:var(--no);color:#a83350}
.opt .mark{margin-left:auto;font-weight:800;font-size:17px}
.explain{margin-top:16px;background:#f2fafd;border-left:4px solid var(--sky);border-radius:10px;padding:13px 15px;font-size:13.5px;line-height:1.6;color:#3c4a63;word-break:keep-all;display:none}
.explain.show{display:block;animation:fadeIn .3s ease}
.explain b{color:var(--blue)}
.next-btn{margin-top:16px;display:none}
.next-btn.show{display:block}
.result-card{background:var(--white);border-radius:26px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.3);margin:auto 0}
.result-hero{background:linear-gradient(150deg,var(--sky),var(--blue) 60%,var(--navy));text-align:center;padding:30px 22px 26px;color:var(--white)}
.result-hero img{width:160px;margin:8px auto 6px;display:block;animation:pop .6s ease}
.r-score{font-size:15px;font-weight:600;opacity:.9}
.r-score b{font-size:30px;font-weight:800;display:block;margin-top:2px}
.r-type{font-size:24px;font-weight:800;margin-top:12px}
.r-tag{display:inline-block;margin-top:10px;background:rgba(255,255,255,.2);border-radius:999px;padding:6px 16px;font-size:13.5px;font-weight:600}
.result-body{padding:26px 22px 30px}
.r-desc{font-size:15px;line-height:1.75;color:#3c4a63;word-break:keep-all;text-align:center;white-space:pre-line}
.actions{margin-top:22px;display:flex;flex-direction:column;gap:10px}
.foot{text-align:center;margin-top:22px;color:rgba(20,51,101,.6);font-size:12px;line-height:1.7}
.toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 22px;border-radius:999px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.35);transition:transform .3s;z-index:40}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

let idx=0, score=0, answered=false;
function startQuiz(){ idx=0; score=0; updateScore(); show('screen-quiz'); render(); }
function render(){
  answered=false;
  const q=QUESTIONS[idx];
  document.getElementById('q-num').textContent='Q'+(idx+1);
  document.getElementById('q-text').innerHTML=q.q;
  document.getElementById('p-count').textContent=(idx+1)+' / '+QUESTIONS.length;
  document.getElementById('p-fill').style.width=(idx/QUESTIONS.length*100)+'%';
  const box=document.getElementById('q-opts'); box.innerHTML='';
  q.opts.forEach(function(label,i){
    const b=document.createElement('button'); b.className='opt'; b.type='button';
    b.innerHTML='<span>'+label+'</span><span class="mark"></span>';
    b.onclick=function(){ choose(i,b); };
    box.appendChild(b);
  });
  const ex=document.getElementById('explain'); ex.classList.remove('show'); ex.innerHTML='';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('next-btn').textContent=(idx===QUESTIONS.length-1)?'결과 보기 →':'다음 문제 →';
}
function choose(i,btn){
  if(answered) return; answered=true;
  const q=QUESTIONS[idx];
  const opts=document.querySelectorAll('#q-opts .opt');
  opts.forEach(function(o,j){
    o.disabled=true;
    if(j===q.a){ o.classList.add('correct'); o.querySelector('.mark').textContent='✓'; }
    if(j===i && i!==q.a){ o.classList.add('wrong'); o.querySelector('.mark').textContent='✕'; }
  });
  if(i===q.a){ score+=POINT; updateScore(); }
  const ex=document.getElementById('explain');
  ex.innerHTML=(i===q.a?'⭕ 정답! ':'❌ 땡! ')+q.ex; ex.classList.add('show');
  document.getElementById('next-btn').classList.add('show');
}
function nextQ(){
  idx++;
  if(idx<QUESTIONS.length){ render(); }
  else{ document.getElementById('p-fill').style.width='100%'; showResult(); }
}
function updateScore(){ const el=document.getElementById('score-pill'); if(el) el.textContent=score+'점'; }
function showResult(){
  const g=GRADES.find(function(x){return score>=x.min;});
  document.getElementById('r-score').textContent=score+' / '+(QUESTIONS.length*POINT);
  document.getElementById('r-img').src=IMGS[g.img];
  document.getElementById('r-type').textContent=g.type;
  document.getElementById('r-tagline').textContent='"'+g.tag+'"';
  document.getElementById('r-desc').textContent=g.desc;
  document.getElementById('kmooc-btn').href=KMOOC_URL;
  document.getElementById('insta-btn').href=INSTA_URL;
  window._grade=g;
  show('screen-result'); window.scrollTo({top:0});
}
function resetQuiz(){ show('screen-start'); window.scrollTo({top:0}); }
function show(id){ document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');}); document.getElementById(id).classList.add('active'); }
function shareResult(){
  const isWeb=location.protocol==='http:'||location.protocol==='https:';
  const g=window._grade||{};
  const text='K-MOOC 퀴즈 챌린지 '+score+'점! 나는 「'+(g.type||'')+'」 너도 도전해봐!';
  const payload=isWeb?text+'\n'+location.href:text;
  if(isWeb && navigator.share){ navigator.share({title:'푸앙이의 K-MOOC 퀴즈 챌린지',text:text,url:location.href}).catch(function(){copyText(payload);}); }
  else copyText(payload);
}
function copyText(str){
  const ok=function(){toast(location.protocol==='file:'?'문구가 복사됐어요! (배포 후엔 링크도 복사돼요)':'링크가 복사되었어요!');};
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(str).then(ok).catch(function(){legacy(str,ok);}); }
  else legacy(str,ok);
}
function legacy(str,done){
  const ta=document.createElement('textarea'); ta.value=str; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){ toast('복사에 실패했어요 😢'); }
  document.body.removeChild(ta);
}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
</script>
